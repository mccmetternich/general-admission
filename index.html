<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>General Admission</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="root">
<style>
  .ga-loader{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#fff}
  @media(prefers-color-scheme:dark){.ga-loader{background:#0A0A0A}}
  .ga-loader-dot{width:6px;height:6px;border-radius:50%;background:#0A0A0A;margin:0 4px;animation:ga-load .9s ease-in-out infinite}
  @media(prefers-color-scheme:dark){.ga-loader-dot{background:#F5F5F5}}
  .ga-loader-dot:nth-child(2){animation-delay:.15s}
  .ga-loader-dot:nth-child(3){animation-delay:.3s}
  @keyframes ga-load{0%,100%{opacity:.2;transform:translateY(0)}50%{opacity:1;transform:translateY(-6px)}}
</style>
<div class="ga-loader"><div class="ga-loader-dot"></div><div class="ga-loader-dot"></div><div class="ga-loader-dot"></div></div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="dotfield.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
